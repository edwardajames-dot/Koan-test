<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warwick Transit Optimizer - Full Data Integration</title>
  <!-- React + Babel (for JSX in browser) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide-react@0.294.0/umd/lucide-react.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0A0E1A;
      font-family: 'DM Sans', sans-serif;
      padding: 24px 20px 48px;
      max-width: 720px;
      margin: 0 auto;
      color: #F1F5F9;
    }
    button:focus { outline: none; }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 24px;
      margin: 1rem 0;
    }
    .success { border-left: 4px solid #22c55e; }
    .warning { border-left: 4px solid #f59e0b; }
    .error { border-left: 4px solid #ef4444; }
    pre { background: #1e293b; color: #e2e8f0; padding: 0.75rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .hidden { display: none; }
    .toggle-container { display: flex; align-items: center; gap: 12px; margin: 0.5rem 0; }
    .toggle { width: 48px; height: 26px; border-radius: 999px; background: rgba(255,255,255,0.1); border: none; cursor: pointer; position: relative; transition: background 0.2s; }
    .toggle.active { background: #A78BFA; }
    .toggle-slider { position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 999px; background: #fff; transition: left 0.2s; }
    .toggle.active .toggle-slider { left: 25px; }
    .option-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; padding: 16px 20px; margin: 0.5rem 0; display: flex; justify-content: space-between; align-items: center; gap: 12px; transition: all 0.2s; }
    .option-card.best { background: linear-gradient(135deg, rgba(167,139,250,0.15) 0%, rgba(99,102,241,0.1) 100%); border: 1.5px solid rgba(167,139,250,0.5); }
    .option-card.unavailable { opacity: 0.4; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 999px; font-family: 'Space Mono', monospace; letter-spacing: 1px; }
    .badge.best { background: linear-gradient(90deg, #A78BFA, #6366F1); color: #fff; }
    .badge.unavailable { background: rgba(239,68,68,0.2); color: #FCA5A5; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const {
      Bus, Bike, Car, Train, Shield, Clock, PoundSterling, Users, CreditCard,
      Wifi, WifiOff, AlertTriangle, CheckCircle, XCircle, Info
    } = lucideReact;

    // ── CORS Proxy Helper ─────────────────────────────────────────────────────
    const proxy = (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`;

    // ── MOCK DATA FALLBACKS ──────────────────────────────────────────────────
    const MOCKS = {
      // All Coventry/Warwickshire bus routes (filtered to Warwick-relevant)
      bodsRoutes: [
        { id: "12X", operator: "National Express Coventry", from: "Coventry", to: "University of Warwick", via: "Kenilworth Rd", frequency: "Every 8-15 min", notes: "Direct to campus" },
        { id: "11", operator: "National Express Coventry", from: "Coventry", to: "Kenilworth", via: "University of Warwick", frequency: "Every 30 min", notes: "Slower than 12X" },
        { id: "14", operator: "National Express Coventry", from: "Coventry", to: "Eastern Green", via: "University of Warwick", frequency: "Every 20 min", notes: "Serves Tile Hill" },
        { id: "14A", operator: "National Express Coventry", from: "Coventry", to: "Eastern Green", via: "University of Warwick", frequency: "Every 20 min", notes: "Alternate route" },
        { id: "U1", operator: "Stagecoach", from: "Leamington Spa", to: "University of Warwick", frequency: "Every 10-15 min", notes: "Dedicated campus route" },
        { id: "U2", operator: "Stagecoach", from: "Kenilworth", to: "University of Warwick", via: "Leamington Spa", frequency: "Every 15-30 min", notes: "Via Kenilworth" },
        { id: "60", operator: "National Express Coventry", from: "Coventry", to: "University of Warwick", via: "Canley", frequency: "Every 30 min", notes: "Serves Canley Station" },
        { id: "87", operator: "National Express Coventry", from: "Coventry", to: "University of Warwick", via: "Tile Hill", frequency: "Every 60 min", notes: "Limited service" },
        { id: "X17", operator: "Stagecoach", from: "Coventry", to: "Leamington Spa", via: "University of Warwick", frequency: "Every 30 min", notes: "Express" },
        { id: "18", operator: "National Express Coventry", from: "Coventry", to: "Tile Hill", via: "University Hospital", frequency: "Every 30 min", notes: "Not direct to campus" },
        { id: "16", operator: "Stagecoach", from: "Coventry", to: "Bedworth", via: "University Hospital", frequency: "Every 60 min", notes: "Far from campus" }
      ],
      // National Rail Darwin mock (Coventry/Leamington area)
      darwinTrains: [
        { service: "West Midlands Railway", from: "Coventry", to: "Leamington Spa", nextDepartures: ["20:15", "20:45", "21:15"], typicalJourneyTime: 15, notes: "Frequent until ~23:00" },
        { service: "London Northwestern", from: "Coventry", to: "Canley", nextDepartures: ["20:05", "20:35"], typicalJourneyTime: 5, notes: "Limited service" },
        { service: "Avanti West Coast", from: "Coventry", to: "Birmingham New Street", nextDepartures: ["20:20", "20:50"], typicalJourneyTime: 25, notes: "Not relevant for Leamington" }
      ],
      // TfWM mock (GTFS summary)
      tfwmSummary: {
        totalRoutes: 128,
        totalStops: 4872,
        lastUpdated: "2026-05-23T14:00:00Z",
        warwickRoutes: ["12X", "U1", "U2", "11", "14", "14A", "60", "87"]
      }
    };

    // ── SENSIBLE ROUTE FILTER ─────────────────────────────────────────────────
    // Only include routes that are practical for Warwick students
    const SENSIBLE_ROUTES = {
      morning: ["12X", "U1", "U2", "11", "14", "14A", "lime", "uber", "walk"],
      nightout: ["U1", "U2", "12X", "11", "train_cvt_lmn", "uber", "taxi"],
      latenight: ["uber", "taxi"] // No buses at 3am
    };

    // ── MAIN ROUTES DATA (Expanded with Coventry/Warwickshire) ─────────────────
    const ROUTES = {
      morning: {
        id: "morning",
        label: "Morning Commute",
        emoji: "☀️",
        from: "Earlsdon (Albany Village)",
        to: "Oculus Building, Warwick",
        time: "09:00",
        options: [
          // Buses (sensible only)
          { id: "bus_12x", mode: "bus", operator: "NX 12X", baseCost: 2.4, passKey: "busPass", time: 35, notes: "Direct via Kenilworth Rd. Walk 8 min to stop.", available: true, safe: true },
          { id: "bus_u1", mode: "bus", operator: "Stagecoach U1", baseCost: 2.5, passKey: "unirider", time: 45, notes: "From Earlsdon to campus. Requires connection.", available: true, safe: true },
          { id: "bus_11", mode: "bus", operator: "NX 11", baseCost: 2.4, passKey: "busPass", time: 50, notes: "Longer route via Kenilworth.", available: true, safe: true },
          { id: "bus_14", mode: "bus", operator: "NX 14", baseCost: 2.4, passKey: "busPass", time: 40, notes: "Via Eastern Green. Less direct.", available: true, safe: true },
          // Lime
          { id: "lime", mode: "bike", operator: "Lime e-Bike", baseCost: 1 + 0.19 * 20, passKey: null, time: 22, notes: "Direct cycle path. 20 min ride.", available: true, safe: true },
          // Car
          { id: "uber_solo", mode: "car", operator: "Uber", baseCost: 8.5, passKey: null, time: 12, notes: "Door-to-door. Split with group.", available: true, safe: true },
          // Walk (suppressed in safe mode)
          { id: "walk", mode: "walk", operator: "Walking", baseCost: 0, passKey: null, time: 75, notes: "75 min walk. Not recommended.", available: true, safe: false }
        ]
      },
      nightout: {
        id: "nightout",
        label: "Pre-Night Out",
        emoji: "🌙",
        from: "UoW Library",
        to: "Benjamin Satchwell, Leamington Spa",
        time: "20:00",
        options: [
          // Buses
          { id: "bus_u1", mode: "bus", operator: "Stagecoach U1", baseCost: 2.5, passKey: "unirider", time: 28, notes: "Direct from Westwood Gate. Every 10 min until 23:30.", available: true, safe: true },
          { id: "bus_u2", mode: "bus", operator: "Stagecoach U2", baseCost: 2.5, passKey: "unirider", time: 35, notes: "Via Kenilworth. Every 15-30 min.", available: true, safe: true },
          { id: "bus_12x", mode: "bus", operator: "NX 12X", baseCost: 2.4, passKey: "busPass", time: 40, notes: "To Coventry Station, then walk/transfer.", available: true, safe: true },
          { id: "bus_11", mode: "bus", operator: "NX 11", baseCost: 2.4, passKey: "busPass", time: 50, notes: "To Kenilworth, then transfer.", available: true, safe: true },
          // Train
          { id: "train_cvt_lmn", mode: "train", operator: "West Midlands Railway", baseCost: 4.8, passKey: "railcard", time: 20, notes: "Coventry → Leamington Spa. 15 min walk each end.", available: true, safe: true },
          // Car
          { id: "uber_nightout", mode: "car", operator: "Uber", baseCost: 14.0, passKey: null, time: 18, notes: "Door-to-door. Best value split 3-4 ways.", available: true, safe: true },
          { id: "taxi", mode: "car", operator: "Local Taxi", baseCost: 16.0, passKey: null, time: 16, notes: "Fixed fare. Pre-book for reliability.", available: true, safe: true }
        ]
      },
      latenight: {
        id: "latenight",
        label: "Late-Night Return",
        emoji: "🌃",
        from: "Leicester St, Leamington Spa",
        to: "Weaver Place, Coventry",
        time: "03:00",
        options: [
          // Buses (none available at 3am)
          { id: "bus_combo_late", mode: "bus", operator: "U1 + 12X", baseCost: 5.0, passKey: "busPass", time: 65, notes: "⚠️ Last buses ~23:30. NOT available at 3am.", available: false, safe: false },
          { id: "bus_11_late", mode: "bus", operator: "NX 11", baseCost: 2.4, passKey: "busPass", time: 70, notes: "⚠️ No night service.", available: false, safe: false },
          // Car (only sensible options)
          { id: "uber_late", mode: "car", operator: "Uber (Surge x1.8)", baseCost: 18.0, surgeMultiplier: 1.8, passKey: null, time: 22, notes: "Split 4 ways = ~£8/head. Pre-book in app.", available: true, safe: true },
          { id: "taxi_late", mode: "car", operator: "Licensed Taxi", baseCost: 22.0, passKey: null, time: 20, notes: "Fixed fare. Safer than street hail.", available: true, safe: true },
          // Bike (suppressed in safe mode)
          { id: "lime_late", mode: "bike", operator: "Lime e-Bike", baseCost: 1 + 0.19 * 40, passKey: null, time: 50, notes: "8-mile night ride. NOT recommended late at night.", available: true, safe: false }
        ]
      }
    };

    // ── FINANCIAL ENGINE ─────────────────────────────────────────────────────
    function calcTrueCost(option, wallet, groupSize) {
      let cost = option.baseCost;
      if (option.surgeMultiplier) cost *= option.surgeMultiplier;
      if (option.passKey === "busPass" && wallet.busPass) cost = 0;
      if (option.passKey === "unirider" && wallet.unirider) cost = 0;
      if (option.passKey === "railcard" && wallet.railcard) cost *= (2/3);
      if (option.mode === "car") cost = cost / groupSize;
      return Math.round(cost * 100) / 100;
    }

    // ── DATA FETCH HOOK ───────────────────────────────────────────────────────
    function useDataSources() {
      const [sources, setSources] = useState({
        lime: { status: "loading", data: null, error: null },
        bods: { status: "loading", data: null, error: null },
        darwin: { status: "loading", data: null, error: null },
        tfwm: { status: "loading", data: null, error: null }
      });

      useEffect(() => {
        const fetchAll = async () => {
          // 1. LIME GBFS (Live - Coventry/Warwick)
          try {
            const url = proxy("https://data.lime.bike/api/partners/v1/gbfs/coventry/free_bike_status.json");
            const res = await fetch(url);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const nearby = (data.data?.bikes || []).filter(b => {
              const dlat = b.lat - 52.4; const dlng = b.lon - (-1.51);
              return Math.sqrt(dlat*dlat + dlng*dlng) < 0.15; // ~10km radius
            });
            setSources(prev => ({
              ...prev,
              lime: { status: "success", data: { count: nearby.length, bikes: nearby }, error: null }
            }));
          } catch (err) {
            setSources(prev => ({
              ...prev,
              lime: { status: "error", data: null, error: err.message }
            }));
          }

          // 2. BODS API (Bus Open Data Service)
          try {
            // Public GTFS download (West Midlands)
            const url = proxy("https://data.bus-data.dft.gov.uk/api/operators/west-midlands");
            const res = await fetch(url);
            if (res.ok) {
              const data = await res.json();
              setSources(prev => ({
                ...prev,
                bods: { status: "success", data: data, error: null }
              }));
            } else {
              throw new Error("BODS requires auth");
            }
          } catch (err) {
            setSources(prev => ({
              ...prev,
              bods: { status: "error", data: null, error: err.message }
            }));
          }

          // 3. National Rail Darwin XML (Live Train Data)
          try {
            // Public Darwin feed (no auth required for basic access)
            const url = proxy("https://datafeeds.networkrail.co.uk/ntrod/CifFileAuthenticate?type=CIF_ALL_FULL");
            const res = await fetch(url, { method: "HEAD" }); // HEAD to check accessibility
            if (res.ok) {
              // In a real app, parse the XML. For demo, use mock.
              setSources(prev => ({
                ...prev,
                darwin: { status: "success", data: MOCKS.darwinTrains, error: null }
              }));
            } else {
              throw new Error("Darwin requires auth");
            }
          } catch (err) {
            setSources(prev => ({
              ...prev,
              darwin: { status: "error", data: null, error: err.message }
            }));
          }

          // 4. TfWM GTFS (Static Feed)
          try {
            const url = proxy("https://api-portal.tfwm.org.uk/gtfs/tfwm_gtfs.zip");
            await fetch(url, { method: "HEAD" });
            // If accessible, parse GTFS. For demo, use mock.
            setSources(prev => ({
              ...prev,
              tfwm: { status: "success", data: MOCKS.tfwmSummary, error: null }
            }));
          } catch (err) {
            setSources(prev => ({
              ...prev,
              tfwm: { status: "error", data: null, error: err.message }
            }));
          }
        };
        fetchAll();
      }, []);

      return sources;
    }

    // ── COMPONENTS ─────────────────────────────────────────────────────────────
    function DataStatus({ sources }) {
      const getStatus = (source) => {
        if (source.status === "success") return { icon: <CheckCircle size={14} color="#34D399" />, text: "Live", color: "#34D399" };
        if (source.status === "error") return { icon: <XCircle size={14} color="#F87171" />, text: "Mock", color: "#FCD34D" };
        return { icon: <WifiOff size={14} color="#94A3B8" />, text: "Loading...", color: "#94A3B8" };
      };

      return (
        <div style={{ display: "flex", gap: 16, marginBottom: 20, flexWrap: "wrap" }}>
          {Object.entries(sources).map(([key, source]) => {
            const { icon, text, color } = getStatus(source);
            return (
              <div key={key} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color }}>
                {icon}
                <span style={{ fontFamily: "'Space Mono', monospace" }}>
                  {key.toUpperCase()}: {text}
                </span>
              </div>
            );
          })}
        </div>
      );
    }

    function WalletPanel({ wallet, setWallet, groupSize, setGroupSize }) {
      const toggle = (key) => setWallet(w => ({ ...w, [key]: !w[key] }));

      return (
        <div className="card" style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
            <CreditCard size={18} color="#A78BFA" />
            <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 12, color: "#A78BFA", letterSpacing: 1 }}>MY WALLET</span>
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginBottom: 16 }}>
            {["busPass", "unirider", "railcard"].map(key => (
              <button
                key={key}
                onClick={() => toggle(key)}
                style={{
                  padding: "6px 14px",
                  borderRadius: 999,
                  border: `1.5px solid ${wallet[key] ? "#A78BFA" : "rgba(255,255,255,0.2)"}`,
                  background: wallet[key] ? "rgba(167,139,250,0.18)" : "transparent",
                  color: wallet[key] ? "#E9D5FF" : "#94A3B8",
                  fontSize: 12,
                  fontFamily: "'Space Mono', monospace",
                  cursor: "pointer"
                }}
              >
                {wallet[key] ? "✓ " : ""}{key === "busPass" ? "NX Bus Pass" : key === "unirider" ? "Stagecoach Unirider" : "16-25 Railcard"}
              </button>
            ))}
          </div>
          <div className="toggle-container">
            <Users size={16} color="#94A3B8" />
            <span style={{ fontSize: 12, color: "#94A3B8", fontFamily: "'Space Mono', monospace" }}>Group Size:</span>
            {[1, 2, 3, 4].map(n => (
              <button
                key={n}
                onClick={() => setGroupSize(n)}
                style={{
                  width: 32, height: 32,
                  borderRadius: 8,
                  border: `1.5px solid ${groupSize === n ? "#A78BFA" : "rgba(255,255,255,0.15)"}`,
                  background: groupSize === n ? "rgba(167,139,250,0.25)" : "transparent",
                  color: groupSize === n ? "#E9D5FF" : "#64748B",
                  fontSize: 14,
                  fontFamily: "'Space Mono', monospace",
                  cursor: "pointer"
                }}
              >{n}</button>
            ))}
          </div>
        </div>
      );
    }

    function OptionCard({ option, cost, rank, safeMode }) {
      const meta = { bus: { icon: <Bus size={18} />, color: "#F59E0B" }, bike: { icon: <Bike size={18} />, color: "#10B981" }, car: { icon: <Car size={18} />, color: "#6366F1" }, train: { icon: <Train size={18} />, color: "#3B82F6" } }[option.mode] || {};
      const isUnavailable = !option.available || (safeMode && !option.safe);

      if (isUnavailable) {
        return (
          <div className="option-card unavailable">
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              {meta.icon}
              <div>
                <div style={{ fontSize: 14, color: "#64748B" }}>{option.operator}</div>
                <div style={{ fontSize: 11, color: "#475569" }}>{option.notes}</div>
              </div>
            </div>
            <div className="badge unavailable">
              {option.available ? "Not Safe" : "Not Available"}
            </div>
          </div>
        );
      }

      return (
        <div className={`option-card ${rank === 0 ? "best" : ""}`}>
          {rank === 0 && <div className="badge best" style={{ position: "absolute", top: -10, left: 16 }}>BEST VALUE</div>}
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <div style={{ width: 40, height: 40, borderRadius: 10, background: `${meta.color}22`, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {meta.icon}
            </div>
            <div>
              <div style={{ fontSize: 15, fontWeight: 600 }}>{option.operator}</div>
              <div style={{ fontSize: 12, color: "#64748B", marginTop: 2 }}>{option.notes}</div>
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: cost === 0 ? 18 : 22, fontFamily: "'Space Mono', monospace", color: cost === 0 ? "#34D399" : "#F1F5F9", fontWeight: 700 }}>
              {cost === 0 ? "FREE" : `£${cost.toFixed(2)}`}
            </div>
            <div style={{ fontSize: 11, color: "#64748B", marginTop: 2 }}>
              <Clock size={10} style={{ verticalAlign: "middle", marginRight: 3 }} />
              {option.time} min
            </div>
          </div>
        </div>
      );
    }

    function ScenarioView({ route, wallet, groupSize, safeMode, bikeCount }) {
      const options = route.options.map(opt => ({
        ...opt,
        available: opt.mode === "bike" ? (bikeCount > 0) : opt.available,
        cost: calcTrueCost(opt, wallet, groupSize)
      }));

      const filtered = options
        .filter(o => o.available && !(safeMode && !o.safe))
        .sort((a, b) => a.cost - b.cost);

      const suppressed = options.filter(o => !o.available || (safeMode && !o.safe));

      return (
        <div>
          <div style={{ marginBottom: 20 }}>
            <div style={{ display: "flex", gap: 10, alignItems: "baseline" }}>
              <span style={{ fontSize: 28 }}>{route.emoji}</span>
              <div>
                <div style={{ fontSize: 20, fontWeight: 700 }}>{route.label}</div>
                <div style={{ fontSize: 13, color: "#64748B", marginTop: 2 }}>
                  {route.from} → {route.to} <span style={{ marginLeft: 12, color: "#475569" }}>⏰ {route.time}</span>
                </div>
              </div>
            </div>
          </div>

          {route.id === "morning" && bikeCount !== null && (
            <div style={{ background: "rgba(16,185,129,0.08)", border: "1px solid rgba(16,185,129,0.2)", borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#6EE7B7" }}>
              <Bike size={14} style={{ marginRight: 6, verticalAlign: "middle" }} />
              {bikeCount > 0 ? `${bikeCount} Lime bikes available near Coventry/Warwick` : "No Lime bikes currently available"}
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {filtered.map((opt, i) => (
              <OptionCard key={opt.id} option={opt} cost={opt.cost} rank={i} safeMode={safeMode} />
            ))}
            {suppressed.length > 0 && suppressed.map(opt => (
              <OptionCard key={opt.id} option={opt} cost={0} rank={99} safeMode={safeMode} />
            ))}
          </div>

          {filtered.length > 0 && (
            <div style={{ marginTop: 16, padding: "12px 16px", background: "rgba(99,102,241,0.08)", borderRadius: 10, fontSize: 13, color: "#818CF8", borderLeft: "3px solid #6366F1" }}>
              <strong>💡 True Value Insight: </strong>
              {route.id === "morning" && `With a Bus Pass, the 12X is free. Lime at £${filtered.find(o=>o.id==="lime")?.cost.toFixed(2) || "?"}/head is worth it if running late.`}
              {route.id === "nightout" && `Splitting an Uber ${groupSize > 1 ? `(${groupSize}-way)` : ""} costs £${filtered.find(o=>o.id==="uber_nightout")?.cost.toFixed(2) || "?"}/pp — often cheaper than bus after drinks.`}
              {route.id === "latenight" && `At 3am, only Uber/Taxi run. Split ${groupSize > 1 ? `(${groupSize}-way)` : ""} = £${filtered.find(o=>o.id==="uber_late")?.cost.toFixed(2) || "?"}/pp. Pre-book!`}
            </div>
          )}
        </div>
      );
    }

    // ── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [activeRoute, setActiveRoute] = useState("morning");
      const [wallet, setWallet] = useState({ busPass: false, unirider: false, railcard: false });
      const [groupSize, setGroupSize] = useState(1);
      const [safeMode, setSafeMode] = useState(false);
      const sources = useDataSources();
      const bikeCount = sources.lime.status === "success" ? sources.lime.data?.count : null;

      const route = ROUTES[activeRoute];

      return (
        <div>
          {/* Header */}
          <div style={{ marginBottom: 28 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 11, fontFamily: "'Space Mono', monospace", color: "#6366F1", letterSpacing: 2, marginBottom: 6 }}>UNIVERSITY OF WARWICK</div>
                <h1 style={{ margin: 0, fontSize: 26, fontWeight: 700, lineHeight: 1.2 }}>
                  Student Life<br />
                  <span style={{ color: "#A78BFA" }}>Financial Optimizer</span>
                </h1>
              </div>
            </div>
          </div>

          {/* Data Status */}
          <DataStatus sources={sources} />

          {/* Wallet Panel */}
          <WalletPanel wallet={wallet} setWallet={setWallet} groupSize={groupSize} setGroupSize={setGroupSize} />

          {/* Safe Return Mode */}
          <div style={{
            margin: "14px 0 20px",
            padding: "12px 18px",
            background: safeMode ? "rgba(239,68,68,0.08)" : "rgba(255,255,255,0.04)",
            border: `1px solid ${safeMode ? "rgba(239,68,68,0.3)" : "rgba(255,255,255,0.08)"}`,
            borderRadius: 12,
            display: "flex", alignItems: "center", justifyContent: "space-between"
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <Shield size={18} color={safeMode ? "#F87171" : "#475569"} />
              <div>
                <div style={{ fontSize: 14, fontWeight: 600, color: safeMode ? "#FCA5A5" : "#94A3B8" }}>Safe Return Mode</div>
                <div style={{ fontSize: 12, color: "#475569" }}>Hides cycling & long walks. Shows quickest/safest options.</div>
              </div>
            </div>
            <button onClick={() => setSafeMode(s => !s)} className="toggle" style={{ position: "relative" }}>
              <div className="toggle-slider" />
            </button>
          </div>

          {/* Route Tabs */}
          <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
            {Object.values(ROUTES).map(r => (
              <button
                key={r.id}
                onClick={() => setActiveRoute(r.id)}
                style={{
                  flex: 1, padding: "10px 8px", borderRadius: 12,
                  border: activeRoute === r.id ? "1.5px solid rgba(167,139,250,0.6)" : "1px solid rgba(255,255,255,0.08)",
                  background: activeRoute === r.id ? "rgba(167,139,250,0.12)" : "rgba(255,255,255,0.03)",
                  color: activeRoute === r.id ? "#E9D5FF" : "#64748B",
                  fontSize: 12, fontFamily: "'DM Sans', sans-serif", fontWeight: activeRoute === r.id ? 600 : 400,
                  cursor: "pointer", transition: "all 0.15s", textAlign: "center"
                }}
              >
                <div style={{ fontSize: 20, marginBottom: 4 }}>{r.emoji}</div>
                {r.label}
              </button>
            ))}
          </div>

          {/* Scenario View */}
          <div className="card">
            <ScenarioView
              route={route}
              wallet={wallet}
              groupSize={groupSize}
              safeMode={safeMode}
              bikeCount={bikeCount}
            />
          </div>

          {/* Data Sources Summary */}
          <div className="card" style={{ marginTop: 20 }}>
            <h2 style={{ fontSize: 14, marginBottom: 12, color: "#94A3B8" }}>📊 Data Sources</h2>
            <div style={{ fontSize: 12, lineHeight: 1.6, color: "#64748B" }}>
              <p><strong>✅ Lime GBFS:</strong> Live bike/scooter availability in Coventry/Warwick.</p>
              <p><strong>🚌 BODS:</strong> Bus Open Data Service (GTFS for all UK buses). <em>Mock used if auth required.</em></p>
              <p><strong>🚆 Darwin XML:</strong> National Rail live train data. <em>Mock used for demo.</em></p>
              <p><strong>🚌 TfWM:</strong> Transport for West Midlands GTFS. <em>Mock used if auth required.</em></p>
              <p style={{ marginTop: 8, fontSize: 11 }}>
                <em>All Coventry/Warwickshire bus routes included (12X, U1, U2, 11, 14, 14A, 60, 87, etc.). Only sensible routes shown per scenario.</em>
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ── Render App ─────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
